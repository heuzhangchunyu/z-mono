services:
  z-meng-backend-dev:
    container_name: z-meng-backend-dev
    image: node:20-alpine
    working_dir: /workspace
    depends_on:
      z-meng-postgres-dev:
        condition: service_healthy
    environment:
      NODE_ENV: development
      SERVER_HOST: 0.0.0.0
      PORT: 4101
      POSTGRES_HOST: z-meng-postgres-dev
      POSTGRES_PORT: 5432
      POSTGRES_DB: z_meng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DATABASE_URL: postgres://postgres:postgres@z-meng-postgres-dev:5432/z_meng
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen3.6-plus}
      DASHSCOPE_IMAGE_BASE_URL: ${DASHSCOPE_IMAGE_BASE_URL:-https://dashscope.aliyuncs.com/api/v1/services/aigc/multimodal-generation/generation}
      DASHSCOPE_IMAGE_MODEL: ${DASHSCOPE_IMAGE_MODEL:-qwen-image-2.0-pro}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_TIMEOUT_MS: ${DASHSCOPE_TIMEOUT_MS:-120000}
      npm_config_update_notifier: "false"
    command: >
      sh -lc "
      corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter z-meng-backend dev
      "
    ports:
      - "4101:4101"
    volumes:
      - ../../../..:/workspace
      - z-meng-backend-node-modules:/workspace/node_modules
      - z-meng-backend-pnpm-store:/pnpm/store
    restart: unless-stopped

  z-meng-postgres-dev:
    container_name: z-meng-postgres-dev
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: z_meng
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - z-meng-postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d z_meng"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  z-meng-backend-node-modules:
  z-meng-backend-pnpm-store:
  z-meng-postgres-dev-data:
